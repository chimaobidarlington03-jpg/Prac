<!DOCTYPE html>
<html>
<head>
  <title>Skyvest Admin</title>

  <style>
    body{
      font-family: Arial;
      background:#0f172a;
      color:white;
      margin:0;
      padding:20px;
    }

    h2, h3{
      color:#16a34a;
    }

    .card{
      background:#1e293b;
      padding:15px;
      margin:10px 0;
      border-radius:10px;
    }

    button{
      padding:8px 12px;
      margin-top:5px;
      border:none;
      border-radius:5px;
      background:#16a34a;
      color:white;
      cursor:pointer;
    }

    button:hover{
      background:#15803d;
    }
  </style>
</head>

<body>

<h2>Admin Panel</h2>

<h3>Deposits</h3>
<div id="deposits">Loading...</div>

<h3>Withdrawals</h3>
<div id="withdrawals">Loading...</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyADD6zb-bPiW1zUd3k6luEe2Bz7_n5xPBg",
  authDomain: "skyvest-student-hub.firebaseapp.com",
  projectId: "skyvest-student-hub"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const ADMIN_EMAIL = "skyvestcapital.ng@gmail.com";

// 🔐 AUTH CHECK
auth.onAuthStateChanged(user => {

  if(!user){
    window.location.href = "index.html";
    return;
  }

  if(user.email !== ADMIN_EMAIL){
    document.body.innerHTML = "<h2>Access Denied</h2>";
    return;
  }

  loadDeposits();
  loadWithdrawals();
});


// ======================
// 💰 LOAD DEPOSITS
// ======================
function loadDeposits(){
  const container = document.getElementById("deposits");
  container.innerHTML = "Loading...";

  db.collection("deposits")
  .orderBy("date","desc")
  .get()
  .then(snapshot => {

    if(snapshot.empty){
      container.innerHTML = "No deposits found";
      return;
    }

    container.innerHTML = "";

    snapshot.forEach(doc => {
      let d = doc.data();

      container.innerHTML += `
        <div class="card">
          <p><b>Email:</b> ${d.email || "N/A"}</p>
          <p><b>Amount:</b> ₦${d.amount}</p>
          <p><b>Proof:</b> ${d.proof || "N/A"}</p>
          <p><b>Status:</b> ${d.status}</p>

          ${d.status === "pending" ? `
            <button onclick="approveDeposit('${doc.id}','${d.userId}',${d.amount})">
              Approve
            </button>
          ` : ""}
        </div>
      `;
    });

  })
  .catch(err => {
    console.log(err);
    container.innerHTML = "Error loading deposits";
  });
}


// ======================
// ✅ APPROVE DEPOSIT
// ======================
function approveDeposit(docId, userId, amount){

  let userRef = db.collection("users").doc(userId);

  userRef.get().then(doc => {
    if(!doc.exists){
      alert("User not found");
      return;
    }

    let newBalance = (doc.data().balance || 0) + Number(amount);

    userRef.update({ balance: newBalance });
  });

  db.collection("deposits").doc(docId).update({
    status: "approved"
  });

  alert("Deposit approved!");
  loadDeposits();
}


// ======================
// 💸 LOAD WITHDRAWALS
// ======================
function loadWithdrawals(){
  const container = document.getElementById("withdrawals");
  container.innerHTML = "Loading...";

  db.collection("withdrawals")
  .orderBy("date","desc")
  .get()
  .then(snapshot => {

    if(snapshot.empty){
      container.innerHTML = "No withdrawals found";
      return;
    }

    container.innerHTML = "";

    snapshot.forEach(doc => {
      let d = doc.data();

      container.innerHTML += `
        <div class="card">
          <p><b>Email:</b> ${d.email || "N/A"}</p>
          <p><b>Amount:</b> ₦${d.amount}</p>
          <p><b>Account:</b> ${d.account || "N/A"}</p>
          <p><b>Status:</b> ${d.status}</p>

          ${d.status === "pending" ? `
            <button onclick="approveWithdrawal('${doc.id}','${d.userId}',${d.amount})">
              Approve
            </button>
          ` : ""}
        </div>
      `;
    });

  })
  .catch(err => {
    console.log(err);
    container.innerHTML = "Error loading withdrawals";
  });
}


// ======================
// ✅ APPROVE WITHDRAWAL
// ======================
function approveWithdrawal(docId, userId, amount){

  let userRef = db.collection("users").doc(userId);

  userRef.get().then(doc => {

    if(!doc.exists){
      alert("User not found");
      return;
    }

    let current = doc.data().balance || 0;

    if(current < amount){
      alert("User does not have enough balance");
      return;
    }

    userRef.update({
      balance: current - Number(amount)
    });
  });

  db.collection("withdrawals").doc(docId).update({
    status: "approved"
  });

  alert("Withdrawal approved!");
  loadWithdrawals();
}

</script>

</body>
</html>
