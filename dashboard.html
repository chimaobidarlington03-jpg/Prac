<!DOCTYPE html>
<html>
<head>
  <title>Skyvest Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    .header{
      background:#16a34a;
      padding:15px;
      text-align:center;
      font-size:20px;
      font-weight:bold;
    }

    .container{
      padding:20px;
    }

    .card{
      background:#1e293b;
      padding:15px;
      margin-bottom:15px;
      border-radius:10px;
    }

    .balance{
      font-size:26px;
      font-weight:bold;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:8px;
      border:none;
      border-radius:6px;
      background:#16a34a;
      color:white;
      cursor:pointer;
    }

    button:hover{
      background:#15803d;
    }

    .history p{
      margin:5px 0;
    }

    .green{ color:lightgreen; }
    .red{ color:#f87171; }
  </style>
</head>

<body>

<div class="header">Skyvest Student Hub</div>

<div class="container">

  <div class="card">
    <p>Wallet Balance</p>
    <div class="balance">₦<span id="balance">0</span></div>
  </div>

  <div class="card">
    <button onclick="deposit()">Deposit</button>
    <button onclick="withdraw()">Withdraw</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <h3>Transaction History</h3>
    <div id="history" class="history">Loading...</div>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyADD6zb-bPiW1zUd3k6luEe2Bz7_n5xPBg",
  authDomain: "skyvest-student-hub.firebaseapp.com",
  projectId: "skyvest-student-hub"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser;

// ======================
// AUTH CHECK (FIXED)
// ======================
auth.onAuthStateChanged(user => {
  if(user){
    currentUser = user;
    loadUserData();
    loadHistory();
  } else {
    window.location.href = "index.html";
  }
});

// ======================
// LOAD USER DATA
// ======================
function loadUserData(){
  db.collection("users").doc(currentUser.uid).get()
  .then(doc => {
    if(doc.exists){
      let d = doc.data();
      document.getElementById("balance").innerText = d.balance || 0;
    }
  });
}

// ======================
// DEPOSIT REQUEST
// ======================
function deposit(){
  let amount = prompt("Enter amount you sent:");
  let proof = prompt("Enter payment reference:");

  if(!amount || !proof){
    alert("Fill all fields");
    return;
  }

  db.collection("deposits").add({
    userId: currentUser.uid,
    email: currentUser.email,
    amount: Number(amount),
    proof: proof,
    status: "pending",
    date: new Date()
  })
  .then(()=>{
    alert("Deposit request sent!");
  });
}

// ======================
// WITHDRAW REQUEST
// ======================
function withdraw(){
  let amount = prompt("Enter amount:");
  let account = prompt("Enter your bank details:");

  if(!amount || !account){
    alert("Fill all fields");
    return;
  }

  db.collection("withdrawals").add({
    userId: currentUser.uid,
    email: currentUser.email,
    amount: Number(amount),
    account: account,
    status: "pending",
    date: new Date()
  })
  .then(()=>{
    alert("Withdrawal request sent!");
  });
}

// ======================
// LOAD HISTORY
// ======================
function loadHistory(){
  const historyDiv = document.getElementById("history");
  historyDiv.innerHTML = "Loading...";

  Promise.all([
    db.collection("deposits").where("userId","==",currentUser.uid).get(),
    db.collection("withdrawals").where("userId","==",currentUser.uid).get()
  ])
  .then(([deposits, withdrawals])=>{

    historyDiv.innerHTML = "";

    deposits.forEach(doc=>{
      let d = doc.data();
      historyDiv.innerHTML += `
        <p class="green">+₦${d.amount} (Deposit - ${d.status})</p>`;
    });

    withdrawals.forEach(doc=>{
      let d = doc.data();
      historyDiv.innerHTML += `
        <p class="red">-₦${d.amount} (Withdrawal - ${d.status})</p>`;
    });

    if(historyDiv.innerHTML === ""){
      historyDiv.innerHTML = "No transactions yet";
    }

  });
}

// ======================
// LOGOUT
// ======================
function logout(){
  auth.signOut().then(()=>{
    window.location.href = "index.html";
  });
}

</script>

</body>
</html>
