<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
</head>
<body>

<h2>Dashboard</h2>

<p>Balance: ₦<span id="balance">0</span></p>

<button onclick="deposit()">Deposit</button>
<button onclick="withdraw()">Withdraw</button>

<h3>History</h3>
<div id="history"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "skyvest-student-hub.firebaseapp.com",
  projectId: "skyvest-student-hub"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let user;

auth.onAuthStateChanged(u=>{
  if(!u) return location.href="index.html";
  user=u;
  loadBalance();
  loadHistory();
});

function loadBalance(){
  db.collection("users").doc(user.uid).get().then(doc=>{
    balance.innerText = doc.data().balance || 0;
  });
}

function deposit(){
  let amt = prompt("Amount:");
  let proof = prompt("Reference:");

  db.collection("deposits").add({
    userId: user.uid,
    email: user.email,
    amount: Number(amt),
    proof: proof,
    status: "pending",
    date: new Date()
  });
}

function withdraw(){
  let amt = prompt("Amount:");
  let acc = prompt("Account:");

  db.collection("withdrawals").add({
    userId: user.uid,
    email: user.email,
    amount: Number(amt),
    account: acc,
    status: "pending",
    date: new Date()
  });
}

function loadHistory(){
  db.collection("deposits").where("userId","==",user.uid).get()
  .then(snap=>{
    history.innerHTML="";
    snap.forEach(doc=>{
      let d=doc.data();
      history.innerHTML+=`<p>+₦${d.amount} (${d.status})</p>`;
    });
  });

  db.collection("withdrawals").where("userId","==",user.uid).get()
  .then(snap=>{
    snap.forEach(doc=>{
      let d=doc.data();
      history.innerHTML+=`<p>-₦${d.amount} (${d.status})</p>`;
    });
  });
}
</script>

</body>
</html>
