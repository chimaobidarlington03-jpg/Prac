<!DOCTYPE html>
<html>
<head>
  <title>Skyvest</title>
</head>
<body>

<h2>Skyvest Login</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>
<p id="msg"></p>

<hr>

<h3>Register</h3>

<input type="text" id="username" placeholder="Username"><br><br>
<input type="email" id="regEmail" placeholder="Email"><br><br>
<input type="password" id="regPass" placeholder="Password"><br><br>

<button onclick="register()">Register</button>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyADD6zb-bPiW1zUd3k6luEe2Bz7_n5xPBg",
  authDomain: "skyvest-student-hub.firebaseapp.com",
  projectId: "skyvest-student-hub"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// 🔥 persistence
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

function login(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, pass)
  .then(()=> window.location.href="dashboard.html")
  .catch(err=> document.getElementById("msg").innerText = err.message);
}

function register(){
  let username = document.getElementById("username").value;
  let email = document.getElementById("regEmail").value;
  let pass = document.getElementById("regPass").value;

  auth.createUserWithEmailAndPassword(email, pass)
  .then(userCred => {

    db.collection("users").doc(userCred.user.uid).set({
      email: email,
      username: username,
      balance: 0,
      savings: 0
    });

    alert("Registered!");
  })
  .catch(err=> alert(err.message));
}
</script>

</body>
</html>
