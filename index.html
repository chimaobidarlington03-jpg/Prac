<!DOCTYPE html>
<html>
<head>
  <title>Skyvest</title>
</head>
<body>

<h2>Login</h2>
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>

<hr>

<h3>Register</h3>
<input id="username" placeholder="Username"><br><br>
<input id="regEmail" placeholder="Email"><br><br>
<input id="regPass" type="password" placeholder="Password"><br><br>
<button onclick="register()">Register</button>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "skyvest-student-hub.firebaseapp.com",
  projectId: "skyvest-student-hub"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

function login(){
  auth.signInWithEmailAndPassword(email.value, password.value)
  .then(()=> location.href="dashboard.html")
  .catch(e=> alert(e.message));
}

function register(){
  auth.createUserWithEmailAndPassword(regEmail.value, regPass.value)
  .then(user=>{
    db.collection("users").doc(user.user.uid).set({
      email: regEmail.value,
      username: username.value,
      balance: 0
    });
    alert("Registered!");
  });
}
</script>

</body>
</html>
